<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#15331F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ID-Bov — Identificação de Animais</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <!-- Firebase (nuvem) — mesmo projeto do Colaborador Eficiente -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap');

    :root{
      --bg:         #F4F7F3;
      --card:       #FFFFFF;
      --border:     rgba(18,38,26,0.12);
      --border-2:   rgba(18,38,26,0.08);
      --shadow-sm:  0 2px 10px rgba(16,40,28,0.06);
      --green:      #1B7A3D;
      --green-2:    #166B4A;
      --green-deep: #15331F;
      --green-light:rgba(27,122,61,0.10);
      --gold:       #D8A521;
      --gold-dark:  #B07E15;
      --gold-light: rgba(216,165,33,0.16);
      --red:        #DD5237;
      --red-light:  rgba(221,82,55,0.13);
      --text:       #182720;
      --text-2:     #5A6353;
      --text-3:     #8A9289;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    input,textarea{font-size:16px} /* iOS: evita zoom automático */
    body{
      font-family:'Manrope',-apple-system,BlinkMacSystemFont,sans-serif;
      background:var(--bg);color:var(--text);
      min-height:100vh;
    }
    .mono{font-family:'Space Mono',monospace}

    /* ── Cabeçalho ── */
    header{
      background:var(--green-deep);color:#fff;
      display:flex;align-items:center;gap:12px;
      padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
      position:sticky;top:0;z-index:5;
    }
    header h1{font-size:1.1rem;font-weight:800;letter-spacing:-0.2px;flex:1;display:flex;align-items:center;gap:9px}
    header .badge{background:var(--gold);color:#23170A;font-family:'Space Mono',monospace;font-size:0.65rem;padding:4px 10px;border-radius:20px;font-weight:700}
    .btn-header{background:rgba(255,255,255,.14);border:none;color:#fff;border-radius:10px;padding:8px 13px;font-weight:800;cursor:pointer;font-size:0.9rem;font-family:inherit}

    /* ── Telas ── */
    .tela{display:none;max-width:560px;margin:0 auto;padding:18px 16px calc(40px + env(safe-area-inset-bottom))}
    .tela.ativa{display:block}

    /* ── Botões grandes de opção ── */
    .opt{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
      border:2px solid var(--border);background:#fff;color:var(--text);
      border-radius:16px;padding:22px 16px;font-family:'Manrope',sans-serif;font-weight:800;
      font-size:1.28rem;cursor:pointer;transition:.12s;box-shadow:0 4px 0 rgba(18,38,26,.10);
      -webkit-tap-highlight-color:transparent;user-select:none}
    .opt:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(18,38,26,.10)}
    .opt.g{border-color:rgba(27,122,61,.45);background:var(--green-light);color:var(--green-2)}
    .opt.r{border-color:rgba(221,82,55,.4);background:rgba(221,82,55,.05);color:var(--red)}
    .opt .em{font-size:1.7rem;line-height:1}

    /* ── Teclado numérico ── */
    .keys{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
    .key{border:2px solid var(--border);background:#fff;color:var(--text);border-radius:16px;
      height:76px;font-family:'Space Mono',monospace;font-weight:700;font-size:2rem;
      cursor:pointer;transition:.1s;box-shadow:0 4px 0 rgba(18,38,26,.10);
      -webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center}
    .key:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(18,38,26,.10)}
    .key.ok{background:var(--green);color:#fff;border-color:var(--green-2);box-shadow:0 4px 0 #0f5a2c}
    .key.ok:active{box-shadow:0 1px 0 #0f5a2c}
    .key.ok:disabled{background:#B9C6BC;border-color:#a7b6ab;box-shadow:0 4px 0 #9aab9f;color:#eef;cursor:default;transform:none}
    .key.del{background:var(--red-light);border-color:rgba(221,82,55,.4);color:var(--red)}

    /* ── Visor do brinco ── */
    .visor{font-family:'Space Mono',monospace;font-weight:700;font-size:2.8rem;text-align:center;
      color:var(--green-deep);letter-spacing:2px;background:#fff;border:2px dashed var(--border);
      border-radius:16px;padding:18px 12px;min-height:82px;display:flex;align-items:center;justify-content:center;word-break:break-all}
    .visor.vazio{color:#B9C6BC}

    /* ── Progresso do assistente ── */
    .steps{display:flex;gap:6px;justify-content:center;margin:2px 0 6px}
    .step-dot{width:28px;height:6px;border-radius:3px;background:rgba(18,38,26,.14)}
    .step-dot.on{background:var(--gold)}
    .step-dot.done{background:var(--green-2)}

    /* ── Chips de resumo ── */
    .chip{display:inline-flex;align-items:center;gap:5px;background:var(--green-light);
      border:1px solid rgba(27,122,61,.3);color:var(--green-2);border-radius:999px;
      padding:5px 11px;font-size:0.8rem;font-weight:800;font-family:'Space Mono',monospace}

    /* ── Lista de animais ── */
    .animal-card{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--border);
      border-radius:14px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow-sm)}
    .animal-sexo{flex:none;width:52px;height:52px;border-radius:12px;display:flex;align-items:center;
      justify-content:center;font-size:1.4rem;font-weight:700}
    .list-header{font-size:0.72rem;font-weight:800;color:var(--text-3);text-transform:uppercase;
      letter-spacing:0.8px;margin:18px 0 8px}
    .empty{text-align:center;color:var(--text-3);padding:34px 16px;font-size:0.92rem;line-height:1.5}

    .btn-grande{width:100%;border:none;cursor:pointer;font-family:'Manrope',sans-serif;font-size:1.18rem;
      background:var(--green);color:#fff;font-weight:800;padding:20px;border-radius:16px;
      box-shadow:0 6px 0 #0f5a2c;display:flex;align-items:center;justify-content:center;gap:10px;
      -webkit-tap-highlight-color:transparent}
    .btn-grande:active{transform:translateY(3px);box-shadow:0 3px 0 #0f5a2c}
    .btn-claro{width:100%;margin-top:12px;border:1.5px solid var(--border);cursor:pointer;font-family:inherit;
      font-size:0.92rem;background:#fff;color:var(--text);font-weight:700;padding:13px;border-radius:12px}

    textarea.obs{width:100%;border:2px solid var(--border);border-radius:14px;padding:14px;
      font-family:inherit;resize:vertical;outline:none;background:#fff;color:var(--text);margin-bottom:12px}

    /* ── Toast ── */
    #toast{position:fixed;bottom:calc(26px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);
      background:var(--green-deep);color:#fff;padding:12px 22px;border-radius:999px;font-size:0.9rem;
      font-weight:700;opacity:0;pointer-events:none;transition:.25s;z-index:99;white-space:nowrap;box-shadow:0 8px 24px rgba(8,25,16,.3)}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    .hint{text-align:center;color:var(--text-2);font-size:0.95rem;margin-bottom:14px}

    /* ── Nuvem: botão do cabeçalho + modal ── */
    #btnNuvem{position:relative;display:flex;align-items:center;justify-content:center}
    #nuvemDot{position:absolute;top:5px;right:5px;width:9px;height:9px;border-radius:50%;background:#8A9289;border:1.5px solid var(--green-deep)}
    #nuvemDot.ok{background:#3ECF6E}
    #nuvemDot.pendente{background:var(--gold)}
    .overlay{display:none;position:fixed;inset:0;background:rgba(10,24,15,.55);z-index:50;align-items:center;justify-content:center;padding:18px}
    .overlay.visivel{display:flex}
    .caixa{background:var(--card);border-radius:20px;padding:20px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(8,25,16,.35)}
    .caixa h3{font-size:1.05rem;font-weight:800;color:var(--green-deep);margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .caixa input{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--border);background:#fff;color:var(--text);margin-bottom:10px;outline:none;font-family:inherit}
    .caixa .erro{display:none;background:var(--red-light);color:var(--red);border-radius:10px;padding:9px 12px;font-size:0.8rem;font-weight:700;margin-bottom:10px}
    .btn-nuvem-acao{width:100%;border:none;cursor:pointer;font-family:'Manrope',sans-serif;font-size:0.95rem;background:var(--green);color:#fff;font-weight:800;padding:13px;border-radius:12px;box-shadow:0 4px 0 #0f5a2c;margin-bottom:9px}
    .btn-nuvem-sec{width:100%;border:1.5px solid var(--border);cursor:pointer;font-family:inherit;font-size:0.86rem;background:#fff;color:var(--text);font-weight:700;padding:11px;border-radius:12px;margin-bottom:9px}
  </style>
</head>
<body>

<header>
  <h1>
    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#D8A521" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6c0 2.2 1.6 3.5 3.4 3.5M20 6c0 2.2-1.6 3.5-3.4 3.5"/><ellipse cx="12" cy="13" rx="5.5" ry="5"/><circle cx="10" cy="12" r=".6" fill="#D8A521"/><circle cx="14" cy="12" r=".6" fill="#D8A521"/><path d="M10 16c.5.5 1.2.8 2 .8s1.5-.3 2-.8"/></svg>
    ID-Bov
  </h1>
  <button class="btn-header" id="btnNuvem" onclick="abrirNuvem()" title="Nuvem / conta">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 18a4.5 4.5 0 0 0 0-9 6 6 0 0 0-11.6 1.6A4 4 0 0 0 6.5 18z"/></svg>
    <span id="nuvemDot"></span>
  </button>
  <span class="badge" id="badgeTotal">0 animais</span>
</header>

<!-- ══ TELA: LISTA DO REBANHO ══ -->
<div class="tela ativa" id="telaHome">
  <button class="btn-grande" onclick="novoAnimal()">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    Cadastrar animal
  </button>
  <div id="resumo" style="display:flex;gap:8px;margin:14px 0 0;flex-wrap:wrap"></div>
  <div class="list-header">Animais cadastrados</div>
  <div id="lista"></div>
  <button id="btnExportar" class="btn-claro" style="display:none" onclick="exportarCSV()">⬇️ Exportar lista (CSV / Excel)</button>
</div>

<!-- ══ TELA: ASSISTENTE DE CADASTRO ══ -->
<div class="tela" id="telaCad">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <button class="btn-header" style="background:rgba(18,38,26,.08);color:var(--text)" onclick="voltarPasso()">←</button>
    <div style="flex:1;font-weight:800;font-size:1.05rem" id="wizTitulo">Novo animal</div>
    <button class="btn-header" style="background:rgba(18,38,26,.08);color:var(--text);font-size:0.8rem" onclick="terminarCadastro()">Terminar</button>
  </div>
  <div class="steps" id="steps"></div>
  <div id="resumoWiz" style="text-align:center;min-height:30px;margin-bottom:10px"></div>
  <div id="wizBody"></div>
</div>

<!-- ══ MODAL: NUVEM / CONTA ══ -->
<div class="overlay" id="modalNuvem" onclick="if(event.target===this)fecharNuvem()">
  <div class="caixa">
    <h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#166B4A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 18a4.5 4.5 0 0 0 0-9 6 6 0 0 0-11.6 1.6A4 4 0 0 0 6.5 18z"/></svg> Nuvem</h3>
    <div id="nuvemBody"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  ID-Bov — identificação de animais por brinco
// ══════════════════════════════════════════════
const DB_KEY = 'idbov-rebanho-v1';
let rebanho = [];   // { id, brinco, sexo, raca, idade, obs, data }
let w = null;       // estado do cadastro em andamento

const IDADES = [
  {v:'0-4',   l:'0 a 4 meses'},
  {v:'5-12',  l:'5 a 12 meses'},
  {v:'13-24', l:'13 a 24 meses'},
  {v:'25-36', l:'25 a 36 meses'},
  {v:'36+',   l:'Acima de 36 meses'}
];
const PASSOS = ['brinco','sexo','raca','idade','obs'];

// ── Persistência ──
function carregar(){ try{ rebanho = JSON.parse(localStorage.getItem(DB_KEY)) || []; }catch(e){ rebanho=[]; } }
function salvar(){ try{ localStorage.setItem(DB_KEY, JSON.stringify(rebanho)); }catch(e){} agendarSync(); }

function labelIdade(v){ const o=IDADES.find(i=>i.v===v); return o?o.l:v; }
function labelSexo(v){ return v==='M'?'Macho':(v==='F'?'Fêmea':''); }

// Próximo número sugerido = maior brinco + 1 (mantém zeros à esquerda)
function sugestao(){
  let max=0, len=0;
  rebanho.forEach(a=>{
    const n=parseInt(a.brinco,10);
    if(!isNaN(n)){ if(n>max) max=n; if(String(a.brinco).length>len) len=String(a.brinco).length; }
  });
  if(!max) return '';
  const prox=String(max+1);
  return len>prox.length ? prox.padStart(len,'0') : prox;
}

function toast(msg,dur=2400){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._tm);
  t._tm=setTimeout(()=>t.classList.remove('show'),dur);
}

// ── Tela inicial ──
function renderHome(){
  const machos=rebanho.filter(a=>a.sexo==='M').length;
  const femeas=rebanho.filter(a=>a.sexo==='F').length;
  document.getElementById('badgeTotal').textContent = rebanho.length+(rebanho.length===1?' animal':' animais');
  document.getElementById('resumo').innerHTML = rebanho.length ? `
    <span class="chip">Total: ${rebanho.length}</span>
    <span class="chip">♂ ${machos}</span>
    <span class="chip">♀ ${femeas}</span>` : '';
  document.getElementById('btnExportar').style.display = rebanho.length?'block':'none';
  const lista=document.getElementById('lista');
  if(!rebanho.length){
    lista.innerHTML=`<div class="empty">Nenhum animal cadastrado ainda.<br>Toque em <b>"Cadastrar animal"</b> para começar.</div>`;
    return;
  }
  lista.innerHTML=[...rebanho].sort((a,b)=>b.data-a.data).map(a=>`
    <div class="animal-card">
      <div class="animal-sexo" style="background:${a.sexo==='F'?'rgba(221,82,55,.10)':'var(--green-light)'};color:${a.sexo==='F'?'var(--red)':'var(--green-2)'}">${a.sexo==='F'?'♀':'♂'}</div>
      <div style="flex:1;min-width:0">
        <div class="mono" style="font-weight:700;font-size:1.2rem;color:var(--green-deep)">${a.brinco}</div>
        <div style="font-size:0.78rem;color:var(--text-2);font-weight:600">${labelSexo(a.sexo)} · ${a.raca} · ${labelIdade(a.idade)}</div>
        ${a.obs?`<div style="font-size:0.76rem;color:var(--text-3);margin-top:2px">📝 ${escaparHTML(a.obs)}</div>`:''}
      </div>
      <button onclick="excluir(${a.id})" style="flex:none;background:var(--red-light);border:none;color:var(--red);border-radius:10px;width:40px;height:40px;cursor:pointer;font-size:1.05rem">✕</button>
    </div>`).join('');
}
function escaparHTML(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function excluir(id){
  const a=rebanho.find(x=>x.id===id); if(!a) return;
  if(!confirm('Excluir o animal de brinco '+a.brinco+'?')) return;
  rebanho=rebanho.filter(x=>x.id!==id);
  // Lápide: registra a exclusão para a nuvem não "ressuscitar" o animal ao mesclar
  if(!excluidos.includes(id)) excluidos.push(id);
  salvarExcluidos();
  salvar(); renderHome();
  toast('Animal '+a.brinco+' excluído');
}

function exportarCSV(){
  const linhas=[['Brinco','Sexo','Raca','Idade','Observacao','Data']];
  [...rebanho].sort((a,b)=>a.data-b.data).forEach(a=>{
    linhas.push([a.brinco, labelSexo(a.sexo), a.raca, labelIdade(a.idade), (a.obs||'').replace(/[\r\n]+/g,' '), new Date(a.data).toLocaleString('pt-BR')]);
  });
  const csv='﻿'+linhas.map(l=>l.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const el=document.createElement('a'); el.href=url; el.download='id-bov-rebanho.csv'; el.click();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}

// ── Assistente passo a passo ──
function novoAnimal(){
  w={ brinco:'', sexo:'', raca:'', idade:'', passo:0 };
  document.getElementById('telaHome').classList.remove('ativa');
  document.getElementById('telaCad').classList.add('ativa');
  renderPasso();
  window.scrollTo(0,0);
}
function terminarCadastro(){
  w=null;
  document.getElementById('telaCad').classList.remove('ativa');
  document.getElementById('telaHome').classList.add('ativa');
  renderHome();
  window.scrollTo(0,0);
}
function voltarPasso(){
  if(!w) return;
  if(w.passo===0){ terminarCadastro(); return; }
  w.passo--; renderPasso();
}

function renderSteps(){
  document.getElementById('steps').innerHTML = PASSOS.map((_,i)=>
    `<div class="step-dot ${i<w.passo?'done':(i===w.passo?'on':'')}"></div>`).join('');
  const partes=[];
  if(w.brinco) partes.push(`<span class="chip">Nº ${w.brinco}</span>`);
  if(w.sexo)   partes.push(`<span class="chip">${labelSexo(w.sexo)}</span>`);
  if(w.raca)   partes.push(`<span class="chip">${w.raca}</span>`);
  if(w.idade)  partes.push(`<span class="chip">${w.idade==='36+'?'+36m':w.idade+'m'}</span>`);
  document.getElementById('resumoWiz').innerHTML=partes.join(' ');
}

function renderPasso(){
  renderSteps();
  const passo=PASSOS[w.passo];
  const body=document.getElementById('wizBody');
  const titulos={brinco:'Número do brinco',sexo:'Sexo do animal',raca:'Raça',idade:'Idade',obs:'Observação'};
  document.getElementById('wizTitulo').textContent=titulos[passo];

  if(passo==='brinco'){
    const sug=sugestao();
    const vazio=!w.brinco;
    body.innerHTML=`
      <div class="hint">Digite o número do brinco</div>
      <div class="visor ${vazio?'vazio':''}" id="visor">${vazio?'—':w.brinco}</div>
      ${sug&&vazio?`<div style="text-align:center;margin-top:10px"><button onclick="usarSugestao('${sug}')" style="background:var(--gold-light);border:1px solid rgba(216,165,33,.4);color:var(--gold-dark);border-radius:999px;padding:9px 18px;font-size:0.9rem;font-weight:800;font-family:'Space Mono',monospace;cursor:pointer">Próximo: ${sug} ↧</button></div>`:''}
      <div id="dupAviso" style="text-align:center;color:var(--red);font-size:0.84rem;font-weight:700;margin-top:8px;min-height:18px"></div>
      <div class="keys">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="key" onclick="digito('${n}')">${n}</button>`).join('')}
        <button class="key del" onclick="apagar()">⌫</button>
        <button class="key" onclick="digito('0')">0</button>
        <button class="key ok" id="keyOk" onclick="confirmarBrinco()" ${vazio?'disabled':''}>✓</button>
      </div>`;
    atualizarDup();
  }
  else if(passo==='sexo'){
    body.innerHTML=`
      <div class="hint">Toque para escolher</div>
      <div style="display:grid;gap:14px">
        <button class="opt g" onclick="escolher('sexo','M')"><span class="em">♂</span> Macho</button>
        <button class="opt r" onclick="escolher('sexo','F')"><span class="em">♀</span> Fêmea</button>
      </div>`;
  }
  else if(passo==='raca'){
    body.innerHTML=`
      <div class="hint">Toque para escolher</div>
      <div style="display:grid;gap:14px">
        <button class="opt g" onclick="escolher('raca','Nelore')">Nelore</button>
        <button class="opt g" onclick="escolher('raca','Cruzado')">Cruzado</button>
      </div>`;
  }
  else if(passo==='idade'){
    body.innerHTML=`
      <div class="hint">Idade aproximada (meses)</div>
      <div style="display:grid;gap:12px">
        ${IDADES.map(i=>`<button class="opt g" style="font-size:1.15rem;padding:18px 12px" onclick="escolher('idade','${i.v}')">${i.l}</button>`).join('')}
      </div>`;
  }
  else if(passo==='obs'){
    body.innerHTML=`
      <div class="hint">Quer adicionar uma observação?</div>
      <div style="display:grid;gap:14px" id="obsEscolha">
        <button class="opt" onclick="salvarAnimal()"><span class="em">✔</span> Não, salvar assim</button>
        <button class="opt g" onclick="mostrarObs()"><span class="em">📝</span> Sim, escrever</button>
      </div>
      <div id="obsCampo" style="display:none">
        <textarea id="obsTexto" class="obs" rows="3" placeholder="Ex.: mancha branca na perna, animal manso..."></textarea>
        <button class="opt g" onclick="salvarAnimal()"><span class="em">✔</span> Salvar e próximo</button>
      </div>`;
  }
}

// ── Teclado numérico ──
function digito(d){
  if(w.brinco.length>=12) return;
  w.brinco+=d;
  const v=document.getElementById('visor');
  v.textContent=w.brinco; v.classList.remove('vazio');
  document.getElementById('keyOk').disabled=false;
  atualizarDup();
}
function apagar(){
  w.brinco=w.brinco.slice(0,-1);
  const v=document.getElementById('visor');
  v.textContent=w.brinco||'—';
  if(!w.brinco) v.classList.add('vazio');
  document.getElementById('keyOk').disabled=!w.brinco;
  atualizarDup();
}
function usarSugestao(n){ w.brinco=n; renderPasso(); }
function atualizarDup(){
  const av=document.getElementById('dupAviso'); if(!av) return;
  av.textContent = (w.brinco && rebanho.some(a=>a.brinco===w.brinco)) ? '⚠️ Este brinco já está cadastrado' : '';
}
function confirmarBrinco(){ if(w.brinco){ w.passo=1; renderPasso(); } }

// Escolha com avanço automático para o próximo passo
function escolher(campo,valor){ w[campo]=valor; w.passo++; renderPasso(); }
function mostrarObs(){
  document.getElementById('obsEscolha').style.display='none';
  document.getElementById('obsCampo').style.display='block';
  document.getElementById('obsTexto').focus();
}

function salvarAnimal(){
  const campo=document.getElementById('obsTexto');
  rebanho.push({
    id:Date.now(), brinco:w.brinco, sexo:w.sexo, raca:w.raca, idade:w.idade,
    obs:campo?campo.value.trim():'', data:Date.now()
  });
  salvar();
  toast('✓ Animal '+w.brinco+' cadastrado');
  // Vai direto para o próximo animal (assistente limpo)
  w={ brinco:'', sexo:'', raca:'', idade:'', passo:0 };
  renderPasso();
  window.scrollTo(0,0);
}

// ══════════════════════════════════════════════
//  NUVEM — Firebase (mesmo projeto/conta do Colaborador Eficiente)
//  O app continua 100% funcional sem conta; a nuvem é opcional.
// ══════════════════════════════════════════════
// Config pública — a segurança vem das regras do Firestore + login.
const FIREBASE_CFG = {
  apiKey: "AIzaSyCo60G2fqYY4qEixzRC2_thhavukXyiPBY",
  authDomain: "colaborador-eficiente.firebaseapp.com",
  projectId: "colaborador-eficiente",
  storageBucket: "colaborador-eficiente.firebasestorage.app",
  messagingSenderId: "457032380116",
  appId: "1:457032380116:web:682c4329691a8eb4b21541"
};
const EXC_KEY = 'idbov-excluidos-v1';
let excluidos = [];
let _auth=null, _db=null, _uid=null, _email='';
let _nuvemOk=false;      // trava: só grava na nuvem depois de ler o estado dela
let _syncTimer=null, _pendente=false, _erroMostrado=false;

function carregarExcluidos(){ try{ excluidos = JSON.parse(localStorage.getItem(EXC_KEY)) || []; }catch(e){ excluidos=[]; } }
function salvarExcluidos(){ try{ localStorage.setItem(EXC_KEY, JSON.stringify(excluidos.slice(-500))); }catch(e){} }

function iniciarNuvem(){
  if(!window.firebase) return;   // sem internet na 1ª visita: SDK não carregou — segue local
  try{
    // App NOMEADO 'idbov': sessão isolada de qualquer outro app Firebase
    const app = firebase.apps.find(a=>a.name==='idbov') || firebase.initializeApp(FIREBASE_CFG,'idbov');
    _auth = app.auth(); _auth.languageCode='pt';
    _db = app.firestore();
    try{ _db.enablePersistence({synchronizeTabs:true}).catch(()=>{}); }catch(e){}
    _auth.onAuthStateChanged(onAuthMudou);
    window.addEventListener('online', ()=>{ if(_pendente) empurrarNuvem(); });
  }catch(e){ console.error('iniciarNuvem:',e); }
}

async function onAuthMudou(user){
  _uid = user ? user.uid : null;
  _email = user ? (user.email||'') : '';
  if(_uid){ await puxarEMesclar(); }
  else { _nuvemOk=false; }
  atualizarDotNuvem();
}

function docNuvem(){ return _db.collection('idbov').doc(_uid); }

// Mescla aparelho + nuvem: união por id, respeitando as lápides de exclusão
async function puxarEMesclar(){
  try{
    const doc = await docNuvem().get();
    const nuvem = doc.exists ? doc.data() : null;
    const excTot = [...new Set([...excluidos, ...((nuvem&&nuvem.excluidos)||[])])];
    const porId = {};
    [...((nuvem&&nuvem.rebanho)||[]), ...rebanho].forEach(a=>{ porId[a.id]=a; });
    rebanho = Object.values(porId).filter(a=>!excTot.includes(a.id)).sort((a,b)=>a.data-b.data);
    excluidos = excTot;
    salvarExcluidos();
    _nuvemOk = true;         // estado conhecido: liberado para gravar
    salvar();                // grava local + agenda envio à nuvem
    renderHome();
  }catch(e){ tratarErroNuvem(e); }
}

function agendarSync(){
  if(!_uid || !_nuvemOk) return;
  _pendente = true;
  atualizarDotNuvem();
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(empurrarNuvem, 1200);
}

async function empurrarNuvem(){
  if(!_db || !_uid || !_nuvemOk) return;
  try{
    await docNuvem().set({
      rebanho: rebanho.map(a=>({id:a.id,brinco:a.brinco,sexo:a.sexo,raca:a.raca,idade:a.idade,obs:a.obs||'',data:a.data})),
      excluidos: excluidos.slice(-500),
      email: _email,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    _pendente=false; _erroMostrado=false;
  }catch(e){ _pendente=true; tratarErroNuvem(e); }
  atualizarDotNuvem();
}

function tratarErroNuvem(e){
  console.error('nuvem:', e);
  if(e && e.code==='permission-denied'){
    if(!_erroMostrado){ toast('⚠️ Nuvem ainda não liberada para o ID-Bov (regras do Firebase)', 6000); _erroMostrado=true; }
    return;
  }
  if(!_erroMostrado){ toast('📴 Sem internet — guardado no aparelho, sincroniza sozinho depois', 5000); _erroMostrado=true; }
}

function atualizarDotNuvem(){
  const d=document.getElementById('nuvemDot');
  d.className = _uid ? (_pendente?'pendente':'ok') : '';
}

// ── Modal da nuvem ──
function abrirNuvem(){
  const body=document.getElementById('nuvemBody');
  if(!window.firebase){
    body.innerHTML=`<p style="font-size:0.88rem;color:var(--text-2);line-height:1.5;margin-bottom:12px">Sem internet agora. A nuvem fica disponível quando a conexão voltar — seus dados continuam guardados no aparelho.</p>
      <button class="btn-nuvem-sec" onclick="fecharNuvem()">Fechar</button>`;
  }
  else if(_uid){
    body.innerHTML=`
      <p style="font-size:0.88rem;color:var(--text-2);line-height:1.5;margin-bottom:12px">Conectado como<br><b style="color:var(--text)">${escaparHTML(_email)}</b></p>
      <p style="font-size:0.82rem;color:var(--text-2);line-height:1.5;margin-bottom:14px">${_pendente?'⏳ Enviando alterações...':'✅ Rebanho sincronizado na nuvem.'}</p>
      <button class="btn-nuvem-sec" style="color:var(--red);border-color:rgba(221,82,55,.35)" onclick="nuvemSair()">Sair da conta</button>
      <button class="btn-nuvem-sec" onclick="fecharNuvem()">Fechar</button>`;
  }
  else {
    body.innerHTML=`
      <p style="font-size:0.85rem;color:var(--text-2);line-height:1.5;margin-bottom:12px">Entre para guardar o rebanho na nuvem e acessar de qualquer aparelho. <b>Pode usar a mesma conta do Colaborador Eficiente.</b></p>
      <div class="erro" id="nuvemErro"></div>
      <input id="nuvemEmail" type="email" placeholder="E-mail" autocomplete="email">
      <input id="nuvemSenha" type="password" placeholder="Senha (mín. 6)" autocomplete="current-password">
      <button class="btn-nuvem-acao" onclick="nuvemEntrar()">Entrar</button>
      <button class="btn-nuvem-sec" onclick="nuvemCriar()">Criar conta nova</button>
      <button class="btn-nuvem-sec" onclick="nuvemRedefinir()">Esqueci a senha</button>
      <button class="btn-nuvem-sec" onclick="fecharNuvem()">Agora não</button>`;
  }
  document.getElementById('modalNuvem').classList.add('visivel');
}
function fecharNuvem(){ document.getElementById('modalNuvem').classList.remove('visivel'); }

function nuvemErro(msg){ const e=document.getElementById('nuvemErro'); if(e){ e.textContent=msg; e.style.display='block'; } }
function traduzErroAuth(e){
  const c=(e&&e.code)||'';
  return ({
    'auth/invalid-email':'E-mail inválido.',
    'auth/user-not-found':'Conta não encontrada. Toque em "Criar conta nova".',
    'auth/wrong-password':'Senha incorreta.',
    'auth/invalid-credential':'E-mail ou senha incorretos.',
    'auth/email-already-in-use':'Este e-mail já tem conta. Toque em "Entrar".',
    'auth/weak-password':'Senha muito fraca (mínimo 6 caracteres).',
    'auth/too-many-requests':'Muitas tentativas. Aguarde um pouco.',
    'auth/network-request-failed':'Sem conexão com a internet.'
  }[c]) || ('Erro: '+(e.message||c));
}
function _credenciais(){
  const em=document.getElementById('nuvemEmail').value.trim();
  const sn=document.getElementById('nuvemSenha').value;
  if(!em||!sn){ nuvemErro('Preencha e-mail e senha.'); return null; }
  return {em,sn};
}
async function nuvemEntrar(){
  const c=_credenciais(); if(!c) return;
  try{ await _auth.signInWithEmailAndPassword(c.em,c.sn); fecharNuvem(); toast('☁️ Nuvem ativada — sincronizando...'); }
  catch(e){ nuvemErro(traduzErroAuth(e)); }
}
async function nuvemCriar(){
  const c=_credenciais(); if(!c) return;
  try{ await _auth.createUserWithEmailAndPassword(c.em,c.sn); fecharNuvem(); toast('☁️ Conta criada — nuvem ativada!'); }
  catch(e){ nuvemErro(traduzErroAuth(e)); }
}
async function nuvemRedefinir(){
  const em=document.getElementById('nuvemEmail').value.trim();
  if(!em){ nuvemErro('Digite seu e-mail no campo acima.'); return; }
  try{ await _auth.sendPasswordResetEmail(em); nuvemErro(''); toast('📧 E-mail de redefinição enviado para '+em, 5000); }
  catch(e){ nuvemErro(traduzErroAuth(e)); }
}
async function nuvemSair(){
  try{ await _auth.signOut(); }catch(e){}
  _nuvemOk=false; _pendente=false;
  fecharNuvem(); atualizarDotNuvem();
  toast('Você saiu da conta. Os dados continuam no aparelho.');
}

// ── Início ──
carregar();
carregarExcluidos();
renderHome();
iniciarNuvem();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
